name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory: ["infra/vpc", "infra/ec2", "infra/rds"]
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.4"

      - name: Terraform Init
        working-directory: ${{ matrix.directory }}
        run: terraform init

      - name: Terraform Format Check
        working-directory: ${{ matrix.directory }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ matrix.directory }}
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0

      - name: Init TFLint
        working-directory: ${{ matrix.directory }}
        run: tflint --init --config=../.tflint.hcl

      - name: Run TFLint
        working-directory: ${{ matrix.directory }}
        run: tflint -f compact --config=../.tflint.hcl

      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.directory }}
        run: |
          terraform plan -no-color \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post Plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ matrix.directory }}/plan_output.txt', 'utf8');
            const planStatus = '${{ steps.plan.outcome }}';
            const body = `## Terraform Plan for \`${{ matrix.directory }}\`
            **Status:** ${planStatus === 'success' ? 'Success' : 'Failed'}

            <details><summary>Plan Output</summary>

            \`\`\`
            ${planOutput}
            \`\`\`
            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
